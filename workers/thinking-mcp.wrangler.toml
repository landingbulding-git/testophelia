name = "ophelia-thinking-mcp"
main = "thinking-mcp.js"
compatibility_date = "2024-01-01"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

# Reuse the same KV namespace as mcp-gateway (keys are prefixed with "think:")
# ANTHROPIC_API_KEY must be set as a secret: wrangler secret put ANTHROPIC_API_KEY
[[kv_namespaces]]
binding = "THINK_CACHE"
id = "4bd9453deb184ebfb59272bf9f5f832e"
