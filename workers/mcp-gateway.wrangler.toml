name = "ophelia-mcp-gateway"
main = "mcp-gateway.js"
compatibility_date = "2024-01-01"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

# KV namespace for response caching (15min TTL)
# Create with: wrangler kv namespace create MCP_CACHE
# Then replace the id below with the real namespace ID
[[kv_namespaces]]
binding = "MCP_CACHE"
id = "REPLACE_WITH_REAL_KV_NAMESPACE_ID"
