name = "ophelia-mcp-gateway"
main = "mcp-gateway.js"
compatibility_date = "2024-01-01"

# Secrets (wrangler secret put …):
#   NOTION_INTEGRATION_TOKEN — Notion internal integration bearer token
#   NOTION_PARENT_PAGE_ID    — UUID of the parent page (integration must have access)
# Optional vars (Dashboard → Variables):
#   CLAUDE_WORKER_URL — defaults to ophelia-gemini-worker …/claude if unset

[observability]
[observability.logs]
enabled = true
invocation_logs = true

# KV namespace for response caching (15min TTL)
# Create with: wrangler kv namespace create MCP_CACHE
# Then replace the id below with the real namespace ID
[[kv_namespaces]]
binding = "MCP_CACHE"
id = "4bd9453deb184ebfb59272bf9f5f832e"

[[services]]
binding = "GEMINI_PROXY"
service = "ophelia-gemini-worker"
