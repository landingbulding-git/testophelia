<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ophelia</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111;
      color: #f0f0f0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px 14px;
      border-bottom: 1px solid #222;
    }
    .logo {
      width: 16px; height: 16px;
      background: #ff7a1a;
      border-radius: 50%;
      box-shadow: 0 0 10px #ff7a1a;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }
    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-stop-guide {
      background: #ea4335;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .btn-stop-guide:hover { background: #d33426; }
    .btn-stop-guide.hidden { display: none; }
    .header .subtitle {
      font-size: 11px;
      color: #888;
    }

    .section {
      padding: 16px 18px;
      border-bottom: 1px solid #1e1e1e;
    }
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }

    /* ── Info row ──────────────────────────────────────────────── */
    .info-row {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 12px 18px;
      font-size: 11px;
      color: #555;
    }
    .shortcut {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 2px 6px;
      font-family: monospace;
      font-size: 10px;
      color: #888;
    }
    .hidden { display: none !important; }

    /* ── Guide section ─────────────────────────────────────────── */
    .btn-guide {
      background: #1a1a2e;
      color: #ff7a1a;
      border: 1.5px solid rgba(255,122,26,0.5);
    }
    .btn-guide:hover { background: #22223a; }

    .guide-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 160px;
      overflow-y: auto;
    }
    .guide-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 7px;
      padding: 8px 10px;
    }
    .guide-item-name {
      flex: 1;
      font-size: 12px;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .guide-item-steps {
      font-size: 10px;
      color: #555;
      white-space: nowrap;
    }
    .guide-item-play {
      background: #ff7a1a;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    .guide-item-copy {
      background: #222;
      color: #888;
      border: 1px solid #333;
      border-radius: 5px;
      padding: 4px 8px;
      font-size: 10px;
      cursor: pointer;
    }
    .guide-link-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .guide-link-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 7px 9px;
      color: #ccc;
      font-size: 11px;
      outline: none;
    }
    .guide-link-input::placeholder { color: #444; }
    .guide-link-go {
      background: #ff7a1a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"></div>
    <h1>Ophelia</h1>
    <div class="header-actions">
      <button class="btn-stop-guide hidden" id="btnStopGuide">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        Stop Guide
      </button>
    </div>
  </div>

  <!-- Guide Creator -->
  <div class="section">
    <div class="section-label">Guide Creator</div>
    <button class="btn btn-guide" id="btnCreateGuide">✦ Create Guide</button>
  </div>

  <!-- My Guides -->
  <div class="section" id="guidesSection">
    <div class="section-label">My Guides</div>
    <div class="guide-list" id="guideList">
      <div style="color:#555;font-size:11px;">No guides saved for this site yet.</div>
    </div>
    <div class="guide-link-row">
      <input class="guide-link-input" id="guideLinkInput" placeholder="Paste guide URL or ID…">
      <button class="guide-link-go" id="guideLinkGo">▶</button>
    </div>
  </div>

  <!-- Keyboard hint -->
  <div class="info-row">
    <kbd class="shortcut">Ctrl+Space</kbd>
    <span>toggles AI assistant</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
