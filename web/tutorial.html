<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ophelia Tutorial</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .status {
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-weight: bold;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            font-size: 14px;
        }
        .session-id {
            background: #f8f9fa;
            color: #495057;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            word-break: break-all;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Ophelia Tutorial</h1>
        <div class="status info">
            The Ophelia Chrome extension will automatically detect this URL and load the tutorial.
        </div>
        <div id="sessionId" class="session-id"></div>
        <div class="status info">
            Make sure the Ophelia Chrome extension is installed and enabled.
        </div>
    </div>

    <script>
        // Get session ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');

        if (sessionId) {
            document.getElementById('sessionId').textContent = `Session ID: ${sessionId}`;
        } else {
            document.getElementById('sessionId').textContent = 'No tutorial ID provided.';
        }
    </script>
</body>
</html>
